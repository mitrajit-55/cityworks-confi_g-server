eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://localhost:3306/asset_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=7071
resilience4j.retry.instances.Task-Service.max-attempts=5
resilience4j.retry.instances.Task-Service.wait-duration=2s
resilience4j.circuitbreaker.instances.citizenServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.citizenServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.citizenServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.citizenServiceCB.permittedNumberOfCallsInHalfOpenState=3

spring.cloud.openfeign.circuitbreaker.enabled=true
