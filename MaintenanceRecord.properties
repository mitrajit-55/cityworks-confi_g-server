spring.application.name=MaintenanceRecord
spring.datasource.url=jdbc:mysql://localhost:3306/maintenance_record?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=7074
resilience4j.retry.instances.MaintenanceRecord-Service.max-attempts=5
resilience4j.retry.instances.MaintenanceRecord-Service.wait-duration=2s
resilience4j.circuitbreaker.instances.MaintenanceRecord-Service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.MaintenanceRecord-Service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.MaintenanceRecord-Service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.MaintenanceRecord-Service.permittedNumberOfCallsInHalfOpenState=3

spring.cloud.openfeign.circuitbreaker.enabled=false
