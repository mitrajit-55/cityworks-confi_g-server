spring.application.name=CompletionEvidence
spring.datasource.url=jdbc:mysql://localhost:3306/completion_evidence?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=7073
resilience4j.retry.instances.Completion-Service.max-attempts=5
resilience4j.retry.instances.Completion-Service.wait-duration=2s
resilience4j.circuitbreaker.instances.Completion-Service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.Completion-Service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.Completion-Service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.Completion-Service.permittedNumberOfCallsInHalfOpenState=3

spring.cloud.openfeign.circuitbreaker.enabled=false
