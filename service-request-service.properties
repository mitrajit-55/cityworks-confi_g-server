server.port=7077

spring.datasource.url=jdbc:mysql://localhost:3306/cityworks_service_request?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

resilience4j.circuitbreaker.instances.citizenServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.citizenServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.citizenServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.citizenServiceCB.permittedNumberOfCallsInHalfOpenState=3

spring.cloud.openfeign.circuitbreaker.enabled=true

management.endpoints.web.exposure.include=health,info,circuitbreakers
