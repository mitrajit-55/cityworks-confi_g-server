server.port=7076
spring.datasource.url=jdbc:mysql://localhost:3306/task_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
# Retry Configuration
resilience4j.retry.instances.Task-Service.max-attempts=5
resilience4j.retry.instances.Task-Service.wait-duration=2s
resilience4j.retry.instances.Task-Service.retry-exceptions=feign.FeignException,java.net.ConnectException
resilience4j.circuitbreaker.instances.Task-Service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.Task-Service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.Task-Service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.Task-Service.permittedNumberOfCallsInHalfOpenState=3

spring.cloud.openfeign.circuitbreaker.enabled=true
